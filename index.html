<!DOCTYPE HTML>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home Liste Nascita - Farmacroce</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, Arial; background: #f6f7fb; margin:0; padding:0; color:#111827; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(16,24,40,0.06); padding: 32px 24px; }
    h1 { color: #d47fa6; text-align: center; margin-bottom: 18px; font-weight: 700; }
    ul.liste { list-style: none; padding: 0; margin: 0; }
    ul.liste li { margin: 18px 0; }
    .list-link { display: block; background: #f6f7fb; border-radius: 8px; padding: 18px 20px; color: #d47fa6; text-decoration: none; font-size: 1.2rem; font-weight: 600; box-shadow: 0 1px 4px rgba(16,24,40,0.04); transition: background 0.15s; }
    .list-link:hover { background: #f3e6f0; color: #a14e7a; }
    .logo { display: block; margin: 0 auto 18px; max-width: 160px; }
    .lead { color: #6b7280; text-align: center; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="Logo.jpg" alt="Logo Farmacroce">
    <h1>Liste Nascita</h1>
    <p class="lead">Scegli la lista nascita da visualizzare:</p>
    <ul class="liste">
      <li><a class="list-link" href="index.html">🎀 Lista Nascita Luna</a></li>
      <!-- Qui potrai aggiungere altre liste in futuro -->
    </ul>
  </div>
</body>
</html>
